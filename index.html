<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMSHS ORACLE | OPERATIONAL READINESS</title>
    <link rel="stylesheet" href="sdrrm-design.css">
    <link rel="icon" type="image/png" href="CMSHS_ORACLE.png">
</head>
<body>

<div id="boot-overlay">
    <div class="hologram-container">
        <img src="CMSHS_LOGO.png" id="boot-logo"> <div class="boot-text">INITIALIZING ORACLE SYSTEM...</div>
        <div class="scanline"></div>
    </div>
</div>

<div id="app">
    <header>
        <div class="brand-container">
            <img src="CMSHS_LOGO.png" class="header-logo">
            <div class="brand">CMSHS ORACLE: OPERATIONAL READINESS</div>
        </div>
        <div class="status">STANDALONE MODE: SECURE</div>
    </header>

    <div id="viewport">
        <div id="map-img"></div>
        
        <div id="stats-hud">
            [ CASUALTY COUNTS ]<br>
            IMMEDIATE: <span id="r-c" class="r-text">0</span><br>
            DELAYED:   <span id="y-c" class="y-text">0</span><br>
            MINOR:     <span id="g-c" class="g-text">0</span><br>
            DECEASED:  <span id="b-c" class="b-text">0</span>
        </div>

        <div id="compass"><div id="needle"></div></div>
    </div>

<div id="triage-hud">
    <button class="triage-btn green" onclick="setStatus(0)">MINOR <span id="g-c">0</span></button>
    <button class="triage-btn yellow" onclick="setStatus(1)">DELAYED <span id="y-c">0</span></button>
    <button class="triage-btn red" onclick="setStatus(2)">IMMEDIATE <span id="r-c">0</span></button>
    <button class="triage-btn black" onclick="setStatus(3)">DECEASED <span id="b-c">0</span></button>
    <button class="triage-btn reset" onclick="clearMap()">[ RESET OPERATIONAL DATA ]</button>
</div>
    
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log("ORACLE: Offline Protocol Active"))
      .catch(err => console.log("Shield Failure:", err));
  }
</script>

<script src="sdrrm-events.js"></script>
</body>

</html>
