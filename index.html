<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CMSHS ORACLE | OPERATIONAL READINESS</title>
    <link rel="stylesheet" href="sdrrm-design.css">
    <link rel="icon" type="image/png" href="CMSHS_ORACLE.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-aruco@0.1.0/src/aruco.min.js"></script>
    
    <script src="qrcode.min.js" defer></script>
    <script src="sdrrm-events.js" defer></script>
    <script src="oracle-kernel.js"></script>
    <script src="coordinate_map.js"></script>
</head>
<body>

<div id="custom-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3 id="modal-title" style="font-family:'Cinzel', serif; color:#0f6; border-bottom:1px solid #333; padding-bottom:10px;">TACTICAL INPUT</h3>
        <p id="modal-desc" style="font-size:0.85em; color:#888; margin:10px 0;"></p>
        
        <input type="text" id="modal-input" placeholder="e.g. JUAN - GYM" autocomplete="off">
        
        <div class="modal-actions">
            <button id="modal-confirm" class="triage-btn">CONFIRM</button>
            <button id="modal-cancel" class="triage-btn reset">CANCEL</button> 
        </div>
    </div>
</div>

<div id="boot-overlay">
    <div class="hologram-container">
        <img src="CMSHS_LOGO.png" id="boot-logo"> 
        <div class="boot-text" id="boot-text">INITIALIZING ORACLE SYSTEM...</div>
        <div class="scanline"></div>
    </div>
</div>

<div id="app">
    <header>
        <div class="brand-container">
            <img src="CMSHS_LOGO.png" class="header-logo">
            <div class="brand">CMSHS ORACLE: OPERATIONAL READINESS</div>
        </div>
        <div class="status">STANDALONE MODE: SECURE</div>
    </header>

    <div id="viewport">
        <div id="map-img"></div>
        
        <div id="stats-hud">
            [ CASUALTY COUNTS ]<br>
            IMMEDIATE: <span id="r-c" class="r-text">0</span><br>
            DELAYED:   <span id="y-c" class="y-text">0</span><br>
            MINOR:     <span id="g-c" class="g-text">0</span><br>
            DECEASED:  <span id="b-c" class="b-text">0</span>
        </div>
    </div>

    <div id="triage-hud">
        <button class="triage-btn green" onclick="setStatus(0)">MINOR</button>
        <button class="triage-btn yellow" onclick="setStatus(1)">DELAYED</button>
        <button class="triage-btn red" onclick="setStatus(2)">IMMEDIATE</button>
        <button class="triage-btn black" onclick="setStatus(3)">DECEASED</button>
        <button class="triage-btn aruco-trigger" onclick="initiateGhostTag()" style="border-color: #ffcc00; color: #ffcc00;">PIN AGENT TAG (BETA)</button>
        <button class="triage-btn sync-qr" onclick="generateTacticalQR()">SHARE REPORT</button>
        <button class="triage-btn" onclick="locateUser()" id="gps-btn" style="border-color: #0096ff; color: #0096ff;"><span id="gps-text">LOCATE ME</span></button>
        <button class="triage-btn intel-report" onclick="showIntelligenceReport()">SYSTEM UPDATES</button>
        <button class="triage-btn oracle-manual" onclick="showHelp()">ORACLE MANUAL</button>
        <button class="triage-btn about-btn" onclick="showAbout()" style="border-color: #8400ff; color: #8400ff;">ABOUT ORACLE</button>
        <button class="triage-btn reset" onclick="clearMap()">RESET OPERATIONAL DATA</button>
    </div>
</div>

<div id="intel-overlay" class="triage-modal">
    <h3 id ="agent-id" class="cinzel">AGENT:</h3>

    <div class="triage-update-grid">
        <button onclick="updateTriage('0')" class="btn-upd green">MINOR</button>
        <button onclick ="updateTriage('1')" class="btn-upd yellow">DELAYED</button>
        <button onclick="updateTriage('2')" class="btn-upd red">IMMEDIATE</button>
        <button onclick="updateTriage('3')" class="btn-upd black">DECEASED</button>
    </div>

    <hr class="tactical-divider">

    <button onclick="deleteAgent()" class="btn-delete">DELETE AGENT</button>
</div>

<div id="ghost-modal" class="tactical-modal" style="display: none;">
    <div class="modal-content">
        
        <div class="modal-header">
            <h2 class="glitch-text">ARUCO VISION LINK</h2>
            <p id="scanner-status">INITIALIZING OPTICAL SENSORS...</p>
        </div>

        <div class="scanner-container">
            <video id="scanner-video" autoplay playsinline muted></video>
            
            <div class="scan-overlay">
                <div class="corner-tl"></div>
                <div class="corner-tr"></div>
                <div class="corner-bl"></div>
                <div class="corner-br"></div>
            </div>
        </div>

        <div id="marker-boundary"></div>

        <div class="input-section">
            <label for="aruco-id-input">ENTER FIDUCIAL ID (0-11)</label>
            <input 
                type="number" 
                id="aruco-id-input" 
                inputmode="numeric" 
                placeholder="ID #" 
                oninput="handleManualAruco()"
            >
        </div>

        <div class="modal-footer">
            <button class="abort-btn" onclick="closeGhostModal()">TERMINATE LINK</button>
        </div>

    </div>
</div>

    <div class="scanner-container">
    <video id="scanner-video" autoplay playsinline muted></video>
    
    <div id="vector-overlay" style="display: none;">
        <div class="axis-x"></div>
        <div class="axis-y"></div>
        <div class="axis-z"></div>
        <div id="floating-id-tag">ID: --</div>
    </div>

    <div class="scan-overlay"></div>
    </div>

<script>
  // 🛡️ IMPROVED OFFLINE SHIELD (Protocol Aware)
  if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("ORACLE SHIELD: ACTIVE"))
      .catch(err => console.log("ORACLE SHIELD: STANDBY", err));
  } else {
    console.log("ORACLE SHIELD: LOCAL FILE MODE (SW DISABLED)");
  }
</script>
</body>
</html>
