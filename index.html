<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CMSHS ORACLE</title>
    <link rel="stylesheet" href="sdrrm-design.css">
    <link rel="icon" type="image/png" href="CMSHS_ORACLE.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-aruco@0.1.0/src/aruco.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
    
    <script src="js/cv.js"></script>
    <script src="js/aruco.js"></script>
    <script src="sdrrm-events.js" defer></script>
</head>
<body>

<div id="boot-overlay">
    <div class="hologram-container">
        <img src="CMSHS_LOGO.png" id="boot-logo" alt="CMSHS LOGO"> 
        <div class="boot-text">INITIALIZING ORACLE SYSTEM...</div>
        <div class="scanline"></div>
    </div>
</div>

<div id="hazard-sidebar" class="sidebar">
    <div class="sidebar-header">
        <h3 class="cinzel" style="color:#ff8000; margin:0;">HAZARD DEPOT</h3>
        <button onclick="toggleSidebar()" class="close-sidebar">×</button>
    </div>
    
    <div class="hazard-grid">
        <button class="hazard-select fire" onclick="setHazardType('fire')">🔥 FIRE</button>
        <button class="hazard-select flood" onclick="setHazardType('flood')">🌊 FLOOD</button>
        <button class="hazard-select bio" onclick="setHazardType('bio')">☣️ BIO</button>
        <button class="hazard-select structure" onclick="setHazardType('structure')">🏗️ COLLAPSE</button>
    </div>

    <div class="safety-controls">
        <button class="triage-btn safe-btn" onclick="confirmSafety()">✅ I'M SAFE!</button>
        <button class="triage-btn hazard-btn" onclick="reportBlockedPath()">⚠️ PATH BLOCKED</button>
    </div>
</div>

<div id="sidebar-tab" onclick="toggleSidebar()">⚠️</div>

<div id="app">
    <header>
        <div class="brand-container">
            <img src="CMSHS_LOGO.png" class="header-logo" alt="LOGO">
            <div class="brand">CMSHS ORACLE: OPERATIONAL READINESS</div>
        </div>
        <div class="status">STANDALONE MODE: SECURE</div>
    </header>

    <div id="viewport">
        <div id="stats-hud">
            <div class="hud-title">[ CASUALTY COUNTS ]</div>
            IMMEDIATE: <span id="r-c">0</span><br>
            DELAYED:   <span id="y-c">0</span><br>
            MINOR:     <span id="g-c">0</span><br>
            DECEASED:  <span id="b-c">0</span>
            <hr class="hud-divider">
            <span id="hazard-status">ORACLE: READY</span>
        </div>

        <div id="map-container">
            <img src="CMSHS-SDRRM-PLAN.png" id="map-img">
            
            <svg id="route-layer" viewBox="0 0 2500 1800"></svg>

            <div id="user-dot" style="display: none;"></div>
        </div>
    </div>

    <div id="triage-hud">
        <button class="triage-btn green" onclick="setStatus(0)">MINOR</button>
        <button class="triage-btn yellow" onclick="setStatus(1)">DELAYED</button>
        <button class="triage-btn red" onclick="setStatus(2)">IMMEDIATE</button>
        <button class="triage-btn black" onclick="setStatus(3)">DECEASED</button>
        
        <button class="triage-btn aruco-trigger" onclick="initiateGhostTag()">
            <span class="icon">👁️</span><br>VISION LINK
        </button>
        
        <button class="triage-btn sync-qr" onclick="generateTacticalQR()">SHARE REPORT</button>
        <button class="triage-btn" onclick="locateUser()" id="gps-btn">
            <span id="gps-text">LOCATE ME</span>
        </button>
        <button class="triage-btn intel-report" onclick="showIntelligenceReport()">SYSTEM UPDATES</button>
        <button class="triage-btn oracle-manual" onclick="showHelp()">MANUAL</button>
        <button class="triage-btn reset" onclick="clearMap()">RESET DATA</button>
    </div>
</div>

<div id="ghost-modal" class="tactical-modal" style="display: none;">
    <div class="modal-content">
        <header class="modal-header">
            <h2 class="glitch-text">VISION LINK</h2>
            <p id="scanner-status">INITIALIZING OPTICAL SENSORS...</p>
        </header>

        <div class="scanner-container">
            <video id="scanner-video" autoplay playsinline muted></video>
            <div class="scan-overlay">
                <div class="corner-tl"></div><div class="corner-tr"></div>
                <div class="corner-bl"></div><div class="corner-br"></div>
            </div>
        </div>

        <footer class="modal-footer">
            <button onclick="closeGhostModal()" class="close-btn">DISCONNECT</button>
        </footer>
    </div>
</div>

<script>
  if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("ORACLE SHIELD: ACTIVE"))
      .catch(err => console.log("ORACLE SHIELD: STANDBY", err));
  }
</script>

</body>
    </html>
